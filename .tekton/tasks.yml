apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  steps:
    - name: cleanup
      image: alpine:latest
      script: |
        #!/bin/sh
        echo "Cleaning up workspace"
        rm -rf /workspace/output || true
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: run-tests
spec:
  steps:
    - name: pytest-test
      image: python:3.12
      script: |
        #!/usr/bin/env sh
        pip install pytest
        pytest
